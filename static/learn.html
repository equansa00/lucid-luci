<title>LUCI Learn</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#e0e0e0;font-family:'SF Mono','Fira Code',monospace;height:100vh;overflow:hidden}
.layout{display:grid;grid-template-columns:260px 1fr;grid-template-rows:56px 1fr;height:100vh}
.header{grid-column:1/-1;background:#111;border-bottom:1px solid #222;display:flex;align-items:center;padding:0 20px;gap:16px}
.header h1{font-size:15px;color:#D4AF37;letter-spacing:2px}
.prog-wrap{flex:1;height:4px;background:#222;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#D4AF37,#f0c840);transition:width .5s}
.prog-lbl{font-size:11px;color:#666;white-space:nowrap}
.back{background:none;border:1px solid #333;color:#888;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;text-decoration:none;display:inline-flex;align-items:center}
.back:hover{border-color:#D4AF37;color:#D4AF37}
.sidebar{background:#0d0d0d;border-right:1px solid #1a1a1a;overflow-y:auto;padding:8px 0}
.sidebar-label{padding:12px 16px 4px;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:2px}
.phase-btn{display:block;width:100%;text-align:left;padding:10px 16px;background:none;border:none;border-left:3px solid transparent;cursor:pointer;font-family:inherit;color:#888;font-size:12px;line-height:1.4;transition:all .15s}
.phase-btn:hover{background:#111;border-left-color:#333;color:#ccc}
.phase-btn.active{background:#141414;border-left-color:#D4AF37;color:#D4AF37}
.phase-btn .meta{font-size:10px;color:#444;margin-top:2px}
.phase-btn.active .meta{color:#8a7020}
.main{display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:0 20px}
.tab{padding:12px 18px;background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:inherit;font-size:12px;color:#555;transition:all .15s}
.tab:hover{color:#aaa}
.tab.active{color:#D4AF37;border-bottom-color:#D4AF37}
.panels{flex:1;overflow:hidden;position:relative}
.panel{display:none;height:100%;overflow-y:auto;padding:24px}
.panel.active{display:block}
.phase-tag{font-size:10px;color:#D4AF37;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.lesson-title{font-size:20px;color:#fff;margin-bottom:6px;line-height:1.3}
.lesson-meta{font-size:12px;color:#555;margin-bottom:20px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.btn{padding:9px 18px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:bold;letter-spacing:.5px;transition:all .15s;border:none}
.btn-gold{background:#D4AF37;color:#000}.btn-gold:hover{background:#f0c840}
.btn-out{background:none;border:1px solid #333;color:#888}.btn-out:hover{border-color:#D4AF37;color:#D4AF37}
.box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:18px;margin-bottom:18px}
.box-title{font-size:10px;color:#D4AF37;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
.teach-text{font-size:13px;color:#ccc;line-height:1.8;white-space:pre-wrap}
.teach-text strong{color:#fff;font-weight:bold}
.teach-text em{color:#D4AF37;font-style:italic}
.teach-text code{background:#1a1a1a;padding:1px 5px;border-radius:3px;color:#D4AF37;font-family:monospace;font-size:12px}
.teach-placeholder{color:#333;font-style:italic;font-size:13px}
.chat-msgs{display:flex;flex-direction:column;gap:10px;max-height:350px;overflow-y:auto;margin-bottom:12px}
.msg-user{background:#1a1a2e;border:1px solid #2a2a4e;color:#aab4e8;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6;align-self:flex-end;max-width:85%}
.msg-luci{background:#0d1a0d;border:1px solid #1a2e1a;color:#aae8aa;padding:10px 14px;border-radius:8px;font-size:13px;line-height:1.6}
.chat-row{display:flex;gap:10px}
.chat-in{flex:1;background:#111;border:1px solid #222;color:#e0e0e0;padding:9px 13px;border-radius:7px;font-family:inherit;font-size:13px;resize:none;min-height:42px}
.chat-in:focus{outline:none;border-color:#D4AF37}
/* Videos */
.vid-section-title{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;margin-top:16px}
.vid-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-bottom:16px}
.vid-card{background:#111;border:1px solid #1a1a1a;border-radius:8px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.vid-card:hover{border-color:#D4AF37}
.vid-thumb{width:100%;aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.vid-thumb img{width:100%;height:100%;object-fit:cover}
.play-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.4);transition:background .15s}
.vid-card:hover .play-ov{background:rgba(0,0,0,.2)}
.play-ico{width:44px;height:44px;background:#D4AF37;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;color:#000}
.vid-info{padding:10px 12px}
.vid-title{font-size:12px;color:#ccc;line-height:1.4}
.vid-src{font-size:10px;color:#D4AF37;margin-top:3px}
.ref-link{display:block;padding:10px 14px;background:#0d0d0d;border:1px solid #1a1a1a;border-radius:6px;margin-bottom:8px;color:#88ccff;font-size:13px;text-decoration:none}
.ref-link:hover{border-color:#88ccff}
/* Quiz */
.scenario-box{background:#0d0d1a;border:1px solid #1a1a3a;border-radius:10px;padding:18px;margin-bottom:14px;font-size:13px;color:#aab4e8;line-height:1.8}
/* Progress */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:20px}
.stat-card{background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:14px;text-align:center}
.stat-val{font-size:26px;font-weight:bold;color:#D4AF37}
.stat-lbl{font-size:10px;color:#555;margin-top:4px;text-transform:uppercase;letter-spacing:1px}
.phase-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#0d0d0d;border-radius:6px;border:1px solid #1a1a1a;margin-bottom:6px}
.phase-row.cur{border-color:#D4AF37}
.phase-row-n{font-size:11px;color:#555;width:20px}
.phase-row.cur .phase-row-n{color:#D4AF37}
.phase-row-t{flex:1;font-size:13px;color:#ccc}
.phase-row-s{font-size:11px;color:#555}
/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:999;align-items:center;justify-content:center}
.modal.open{display:flex}
.modal-inner{width:90vw;max-width:880px}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.modal-title{font-size:13px;color:#D4AF37}
.modal-close{background:none;border:1px solid #333;color:#888;padding:6px 12px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px}
.modal-close:hover{border-color:#fff;color:#fff}
.vid-embed{width:100%;aspect-ratio:16/9;border:none;border-radius:8px}
/* Spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#D4AF37;border-radius:50%;animation:sp .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:#222;border-radius:2px}

function lkey(l) { return "p"+l.phase+"_m"+l.module+"_l"+l.lesson; }

function esc(s) {
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function md(text) {
  if (!text) return "";
  // Step 1: escape HTML entities first
  var s = text
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
  // Step 2: simple line-by-line processing (avoid complex regex on Unicode)
  var lines = s.split("\n");
  var out = [];
  for (var i=0; i<lines.length; i++) {
    var line = lines[i];
    // Headers
    if (line.indexOf("### ") === 0) {
      out.push('<h3 style="color:#D4AF37;margin:10px 0 4px;font-size:13px">'+line.slice(4)+'</h3>');
      continue;
    }
    if (line.indexOf("## ") === 0) {
      out.push('<h2 style="color:#D4AF37;margin:12px 0 6px;font-size:15px">'+line.slice(3)+'</h2>');
      continue;
    }
    if (line.indexOf("# ") === 0) {
      out.push('<h1 style="color:#D4AF37;margin:14px 0 6px;font-size:17px">'+line.slice(2)+'</h1>');
      continue;
    }
    // Bullet
    if (line.indexOf("- ") === 0) {
      line = '<span style="color:#D4AF37">&#8226;</span> ' + line.slice(2);
    }
    // Inline: bold **text**
    line = line.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
    // Inline: italic *text*
    line = line.replace(/\*([^*]+)\*/g, "<em>$1</em>");
    // Inline: code `text`
    line = line.replace(/`([^`]+)`/g, '<code style="background:#1a1a1a;padding:1px 5px;border-radius:3px;color:#D4AF37;font-family:monospace;font-size:12px">$1</code>');
    out.push(line);
  }
  return out.join("<br>");
}

function showTab(name) {
  var tabs = document.querySelectorAll(".tab");
  var names = ["lesson","videos","quiz","progress"];
  tabs.forEach(function(t,i){ t.classList.toggle("active", names[i]===name); });
  document.querySelectorAll(".panel").forEach(function(p){
    p.classList.toggle("active", p.id==="panel-"+name);
  });
  if (name==="videos") renderVideos();
  if (name==="quiz") { renderQuizStats(); }
  if (name==="progress") renderProgress();
}

function openVid(id, title) {
  document.getElementById("modalTitle").textContent = title;
  document.getElementById("vidFrame").src = "https://www.youtube.com/embed/"+id+"?autoplay=1";
  document.getElementById("vidModal").classList.add("open");
}

function closeVid() {
  document.getElementById("vidModal").classList.remove("open");
  document.getElementById("vidFrame").src = "";
}

document.getElementById("vidModal").addEventListener("click", function(e){
  if (e.target === this) closeVid();
});

    var pct = data.progress_pct || 0;
    document.getElementById("progFill").style.width = pct+"%";
    document.getElementById("progLbl").textContent = data.completed+"/"+data.total_lessons+" ("+pct+"%)";
    if (_cur) {
      document.getElementById("lessonTag").textContent = "Phase "+_cur.phase+": "+_cur.phase_title+" \u00b7 Module "+_cur.module;
      document.getElementById("lessonTitle").textContent = _cur.lesson_title;
      document.getElementById("lessonMeta").textContent = "Lesson "+_cur.lesson+" of "+_cur.total_lessons+" in this module";
      document.getElementById("vidTag").textContent = "Phase "+_cur.phase+": "+_cur.phase_title;
      document.getElementById("vidTitle").textContent = _cur.lesson_title;
      document.getElementById("quizTag").textContent = "Phase "+_cur.phase+": "+_cur.phase_title;
      document.getElementById("quizTitle").textContent = "Quiz: "+_cur.lesson_title;
    }
    var list = document.getElementById("phaseList");
    list.innerHTML = "";
    (data.phases||[]).forEach(function(p){
      var btn = document.createElement("button");
      btn.className = "phase-btn" + ((_cur && p.phase===_cur.phase)?" active":"");
      btn.innerHTML = '<div>'+(p.phase)+'. '+esc(p.title)+'</div><div class="meta">'+esc(p.duration)+' \u00b7 '+p.module_count+' modules</div>';
      list.appendChild(btn);
    });
  }).catch(function(e){ 
    console.error("curriculum error",e); 
    document.getElementById("lessonTag").textContent = "Error: "+e.message;
    document.getElementById("lessonTitle").textContent = e.message;
  });
}

function doTeach() {
  var btn = document.getElementById("teachBtn");
  btn.disabled = true;
  btn.textContent = "Teaching...";
  document.getElementById("teachOut").innerHTML = '<span class="spin"></span> LUCI is preparing your lesson...';
  fetch("/learn/teach", {method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})
    .then(function(r){ return r.json(); })
    .then(function(data){
      document.getElementById("teachOut").innerHTML = '<div class="teach-text">'+md(data.response||"No response")+'</div>';
      btn.disabled = false;
      btn.textContent = "\u21ba Re-teach";
    })
    .catch(function(e){
      document.getElementById("teachOut").textContent = "Error: "+e.message;
      btn.disabled = false;
      btn.textContent = "\u25b6 Start Lesson";
    });
}

document.getElementById("chatIn").addEventListener("keydown", function(e){
  if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); doChat(); }
});

function doChat() {
  var inp = document.getElementById("chatIn");
  var text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  var msgs = document.getElementById("chatMsgs");
  msgs.innerHTML += '<div class="msg-user">'+esc(text)+'</div>';
  msgs.innerHTML += '<div class="msg-luci" id="chatWaiting"><span class="spin"></span> Thinking...</div>';
  msgs.scrollTop = msgs.scrollHeight;
  _chatHist.push({role:"user",content:text});
  fetch("/learn/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({text:text,history:_chatHist.slice(-6)})})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var el = document.getElementById("chatWaiting");
      if (el) { el.removeAttribute("id"); el.innerHTML = md(data.response||""); }
      _chatHist.push({role:"assistant",content:data.response||""});
      msgs.scrollTop = msgs.scrollHeight;
    });
}

function renderVideos() {
  if (!_cur) return;
  var key = lkey(_cur);
  var vids = VIDEOS[key] || [];
  var refs = REFS[key] || [];
  var colt = COLT[_cur.phase];
  var html = "";
  if (colt) {
    html += '<div class="vid-section-title">&#127891; COLT STEELE &mdash; UDEMY</div>';
    html += '<div style="background:#111;border:1px solid #D4AF3766;border-radius:8px;padding:16px;margin-bottom:16px">';
    html += '<div style="color:#D4AF37;font-size:12px;font-weight:bold;margin-bottom:8px">'+esc(colt.t)+'</div>';
    html += '<a href="'+colt.u+'" target="_blank" style="background:#D4AF37;color:#000;padding:7px 14px;border-radius:6px;text-decoration:none;font-size:12px;font-weight:bold">Open on Udemy &#8594;</a>';
    html += '<div style="color:#555;font-size:11px;margin-top:8px">Paid (~$15 on sale) &mdash; best for this phase</div></div>';
  }
  if (vids.length) {
    html += '<div class="vid-section-title">&#9654; FREE YOUTUBE VIDEOS</div><div class="vid-grid">';
    vids.forEach(function(v){
      var searchUrl = "https://www.youtube.com/results?search_query="+encodeURIComponent(v.t+" "+v.s);
      var thumbUrl  = "https://img.youtube.com/vi/"+v.id+"/mqdefault.jpg";
      var card  = document.createElement("div");
      card.className = "vid-card";
      card.addEventListener("click", (function(vid){ return function(){ openVid(vid.id, vid.t); }; })(v));
      var tDiv  = document.createElement("div");
      tDiv.className = "vid-thumb";
      var img   = document.createElement("img");
      img.src   = thumbUrl;
      img.alt   = "";
      img.addEventListener("error", (function(su){ return function(){
        this.parentElement.innerHTML = "<div style='padding:16px;color:#888;font-size:12px;text-align:center'>Unavailable &mdash; <a href=\""+su+"\" target=\"_blank\" style=\"color:#D4AF37\">Search YouTube</a></div>";
        this.parentElement.parentElement.onclick = function(){ window.open(su,"_blank"); };
      }; })(searchUrl));
      var pDiv  = document.createElement("div");
      pDiv.className = "play-ov";
      pDiv.innerHTML = "<div class=\"play-ico\">&#9654;</div>";
      tDiv.appendChild(img);
      tDiv.appendChild(pDiv);
      var iDiv  = document.createElement("div");
      iDiv.className = "vid-info";
      iDiv.innerHTML = "<div class=\"vid-title\">"+esc(v.t)+"</div><div class=\"vid-src\">"+esc(v.s)+"</div>";
      card.appendChild(tDiv);
      card.appendChild(iDiv);
      var wrap  = document.createElement("div");
      wrap.appendChild(card);
      html += wrap.innerHTML;
    });
    html += '</div>';
  } else {
    html += '<div style="color:#555;font-size:13px;padding:20px 0">No curated videos for this lesson yet. Ask LUCI on the Lesson tab.</div>';
  }
  if (refs.length) {
    html += '<div class="vid-section-title">&#128218; REFERENCE</div>';
    refs.forEach(function(r){ html += '<a class="ref-link" href="'+r.u+'" target="_blank">&#128196; '+esc(r.t)+' &#8594;</a>'; });
  }
  document.getElementById("vidContent").innerHTML = html;
}

function doQuiz(idx) {
  fetch("/learn/quiz/scenarios").then(function(r){ return r.json(); }).then(function(data){
    _scenarios = data.scenarios || [];
    if (!_scenarios.length) {
      document.getElementById("quizArea").innerHTML = '<div class="scenario-box">No scenarios yet for this lesson. Try asking LUCI on the Lesson tab.</div>';
      return;
    }
    var i = idx < 0 ? Math.floor(Math.random()*_scenarios.length) : Math.min(idx, _scenarios.length-1);
    _curScenario = _scenarios[i];
    var html = '<div class="scenario-box"><div style="font-size:10px;color:#D4AF37;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px">Scenario '+(i+1)+' of '+_scenarios.length+'</div>';
    html += esc(_curScenario).split('\\n').join('<br>')+'</div>';
    html += '<div id="quizMsgs" class="chat-msgs"></div>';
    html += '<div class="chat-row"><textarea class="chat-in" id="quizIn" rows="3" placeholder="Type your answer... LUCI will evaluate it."></textarea>';
    html += '<button class="btn btn-gold" onclick="doAnswer()">Submit</button></div>';
    document.getElementById("quizArea").innerHTML = html;
    document.getElementById("quizIn").addEventListener("keydown", function(e){
      if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); doAnswer(); }
    });
  });
}

function doAnswer() {
  var inp = document.getElementById("quizIn");
  if (!inp) return;
  var ans = inp.value.trim();
  if (!ans || !_curScenario) return;
  inp.value = "";
  var msgs = document.getElementById("quizMsgs");
  msgs.innerHTML += '<div class="msg-user">'+esc(ans)+'</div>';
  msgs.innerHTML += '<div class="msg-luci" id="evalWaiting"><span class="spin"></span> Evaluating...</div>';
  msgs.scrollTop = msgs.scrollHeight;
  fetch("/learn/quiz/evaluate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({scenario:_curScenario,answer:ans})})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var el = document.getElementById("evalWaiting");
      if (el) { el.removeAttribute("id"); el.innerHTML = md(data.response||""); }
      msgs.scrollTop = msgs.scrollHeight;
      renderQuizStats();
    });
}

function doExam() {
  document.getElementById("quizArea").innerHTML = '<div class="scenario-box">&#128221; Preparing phase exam...</div>';
  fetch("/learn/exam",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})
    .then(function(r){ return r.json(); })
    .then(function(data){
      var html = '<div class="scenario-box">Phase Exam &mdash; 3 questions, answer each then submit</div>';
      html += '<div class="msg-luci">'+md(data.response||"")+'</div>';
      html += '<div style="margin-top:14px" class="chat-row"><textarea class="chat-in" id="quizIn" rows="3" placeholder="Your answer to question 1..."></textarea><button class="btn btn-gold" onclick="doAnswer()">Submit</button></div>';
      document.getElementById("quizArea").innerHTML = html;
    });
}

function renderQuizStats() {
  fetch("/learn/quiz/stats").then(function(r){ return r.json(); }).then(function(data){
    if (!data.total) { document.getElementById("statsOut").textContent = "No quizzes yet. Click Random to start."; return; }
    var pct = Math.round(data.pass/data.total*100);
    document.getElementById("statsOut").innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">'
      +'<div class="stat-card"><div class="stat-val">'+data.total+'</div><div class="stat-lbl">Total</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:#00ff88">'+data.pass+'</div><div class="stat-lbl">Pass</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:#ffd700">'+data.partial+'</div><div class="stat-lbl">Partial</div></div>'
      +'<div class="stat-card"><div class="stat-val" style="color:#ff3333">'+data.needs_review+'</div><div class="stat-lbl">Review</div></div>'
      +'</div><div style="margin-top:8px;font-size:11px;color:#555">Pass rate: '+pct+'%</div>';
  });
}

function doNext() {
  if (!confirm("Mark this lesson complete and advance?")) return;
  fetch("/learn/next",{method:"POST",headers:{"Content-Type":"application/json"},body:"{}"})
    .then(function(r){ return r.json(); })
    .then(function(){ loadCurriculum(); document.getElementById("teachOut").innerHTML='<span class="teach-placeholder">Lesson advanced! Click Start Lesson to begin.</span>'; _chatHist=[]; });
}

function renderProgress() {
  fetch("/learn/curriculum").then(function(r){ return r.json(); }).then(function(data){
    var pct = data.progress_pct||0;
    document.getElementById("statGrid").innerHTML =
      '<div class="stat-card"><div class="stat-val">'+data.completed+'</div><div class="stat-lbl">Done</div></div>'
      +'<div class="stat-card"><div class="stat-val">'+data.total_lessons+'</div><div class="stat-lbl">Total</div></div>'
      +'<div class="stat-card"><div class="stat-val">'+pct+'%</div><div class="stat-lbl">Complete</div></div>'
      +'<div class="stat-card"><div class="stat-val">'+(data.phases||[]).length+'</div><div class="stat-lbl">Phases</div></div>';
    var ph = document.getElementById("allPhases");
    ph.innerHTML = (data.phases||[]).map(function(p){
      var cur = data.current_lesson && p.phase===data.current_lesson.phase;
      return '<div class="phase-row'+(cur?" cur":"")+'">'
        +'<div class="phase-row-n">'+p.phase+'</div>'
        +'<div class="phase-row-t">'+esc(p.title)+'</div>'
        +'<div class="phase-row-s">'+esc(p.duration)+(cur?" \u00b7 IN PROGRESS":"")+'</div>'
        +'</div>';
    }).join("");
  });
}

loadCurriculum();
</script>
</body>
</html>
